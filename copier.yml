# Copier interview for stellars-jupyterhub-ds deployment overlays.
#
# Generates a thin overlay directory that lives alongside a read-only
# clone of upstream stellars-jupyterhub-ds. The overlay carries:
#   - compose_override.yml (Traefik wiring + branding env vars)
#   - branding/ (logo / favicon / icon assets)
#   - certs/ (self-signed cert scripts, optional)
#   - env.default / .env (operator settings)
#   - start.sh / stop.sh
#
# Upstream is cloned read-only on first start.sh, so the overlay stays
# upgradeable: pull new upstream commits without touching this directory.
#
# Run:
#   pip install copier
#   copier copy gh:stellarshenson/copier-stellars-jupyterhub-ds ./my-jupyterhub

_subdirectory: template
_min_copier_version: "9.0"
_exclude:
  # Always-excluded copier scaffolding
  - "copier.yml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".ipynb_checkpoints"
  - "**/.ipynb_checkpoints"
# Files rendered on first copy but never overwritten on `copier update` -
# operators are expected to customise these locally.
_skip_if_exists:
  - ".env"
_tasks:
  - "chmod +x start.sh stop.sh"
  - "chmod +x certs/certs_generate.sh"
_message_after_copy: |2

    ╔══════════════════════════════════════════════════════════════════╗
    ║  {{ project_name }} - deployment scaffolded
    ╚══════════════════════════════════════════════════════════════════╝

    ┌─ Identity
    │  Project name           {{ project_name }}
    │  Project slug           {{ project_slug }}
    │  Branding prefix        {{ branding_prefix }}
    ├─ Access
    │  URL                    https://{% if jupyterhub_subdomain %}{{ jupyterhub_subdomain }}.{% endif %}{{ base_hostname }}/
    │  Admin username         {{ admin_username }}
    │  Self-registration      {{ 'enabled' if signup_enabled else 'disabled (admin bootstrap window opens on fresh DB)' }}
    ├─ Networking
    │  Base hostname          {{ base_hostname }}
    │  Subdomain              {{ jupyterhub_subdomain or '(root domain)' }}
    ├─ TLS  (self-signed; bundled local reverse proxy)
    │  Cert CN                {{ cert_common_name }}
    │  Cert DNS altnames      {{ cert_dns_altnames }}
    ├─ Hub features
    │  Timezone               {{ timezone or 'UTC' }}
    │  Idle culler            {{ 'enabled (max +48h extension)' if idle_culler_enabled else 'disabled' }}
    │  CIFS shared mount      {{ 'enabled (toggle via ENABLE_CIFS=1 in .env)' if cifs_shared_mount else 'disabled' }}
    ├─ Built-in defaults  (not asked for; edit compose_override.yml to change)
    │  Notebook image         stellars/stellars-jupyterlab-ds:latest
    │  Hub URL prefix         /  (root path)
    │  Upstream tracking      clone (read-only; refresh via start.sh --refresh)
    │  Toolbar capitalize     enabled  (system name shown in caps)
    │  Idle culler max ext    48 hours
    └─

    Next steps:
      cd {{ _copier_conf.dst_path }}
      ./start.sh                       # auto-generates self-signed cert from certs/certs.params on first run

    Then open https://{% if jupyterhub_subdomain %}{{ jupyterhub_subdomain }}.{% endif %}{{ base_hostname }}/
    and complete the admin bootstrap (sign up as '{{ admin_username }}').

# ── Identity ─────────────────────────────────────────────────────────────────
project_name:
  type: str
  help: "Display name for this deployment (e.g. 'Actone AI Hub')."
  default: "My JupyterHub"

project_slug:
  type: str
  help: "Lower-kebab slug used as COMPOSE_PROJECT_NAME and the deployment directory name. Allowed characters: lowercase letters, digits, underscore, hyphen."
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z0-9_-]+$')) %}
    Project slug must contain only lowercase letters, digits, underscores, and hyphens.
    {% endif %}

branding_prefix:
  type: str
  help: "Filename prefix for branding assets (drives <prefix>_logo.png, etc.). Defaults to the project slug with hyphens converted to underscores."
  default: "{{ project_slug | replace('-', '_') }}"
  validator: >-
    {% if not (branding_prefix | regex_search('^[a-z0-9_]+$')) %}
    Branding prefix must contain only lowercase letters, digits, and underscores (no hyphens - filenames use _ as separator).
    {% endif %}

# ── Networking ───────────────────────────────────────────────────────────────
base_hostname:
  type: str
  help: "Hostname, DNS domain, or IP address the deployment is reached on (e.g. 'localhost', 'lab.example.com', '192.168.1.50')."
  default: "localhost"

jupyterhub_subdomain:
  type: str
  help: "Optional subdomain - leave empty to serve at the root host (e.g. https://localhost/). No trailing dot; copier adds it where needed. Auto-empties when base_hostname is an IP."
  default: "{% if base_hostname | regex_search('^\\d{1,3}(\\.\\d{1,3}){3}$') %}{% else %}jupyterhub{% endif %}"

# ── TLS ──────────────────────────────────────────────────────────────────────
cert_common_name:
  type: str
  help: "Certificate common name."
  default: "{{ project_name | upper }} Certificate"

cert_dns_altnames:
  type: str
  help: "Cert SANs (comma-separated). DNS names get a wildcard sibling; an IP address is added as-is (no wildcard - IPs cannot have subject-alt-name wildcards)."
  default: "{% if base_hostname | regex_search('^\\d{1,3}(\\.\\d{1,3}){3}$') %}{{ base_hostname }}{% else %}*.{{ base_hostname }},{{ base_hostname }}{% endif %}"

# ── Authentication ───────────────────────────────────────────────────────────
admin_username:
  type: str
  help: "Initial admin username (JUPYTERHUB_ADMIN). On a fresh DB, signup is silently re-opened scoped to this name only."
  default: "admin"

signup_enabled:
  type: bool
  help: "Operator self-registration. Bootstrap window for the admin still opens on a fresh DB regardless."
  default: false

# ── Hub features ─────────────────────────────────────────────────────────────
timezone:
  type: str
  help: "IANA timezone applied to hub and spawned containers (blank = UTC)."
  default: "Europe/Warsaw"

idle_culler_enabled:
  type: bool
  help: "Idle server culler enabled."
  default: true

cifs_shared_mount:
  type: bool
  help: "Ship CIFS overlay (compose_cifs.yml + ENABLE_CIFS toggle in env.default)."
  default: false

